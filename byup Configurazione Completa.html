<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1440"/>
<title>byup — Configurazione completa</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: #ECEEF1;
    color: #1a1a1a;
    -webkit-font-smoothing: antialiased;
  }
  /* Frame altezza fissa = sidebar resta sempre visibile.
     Solo il <main> interno scrolla via .pn-scroll (vedi sotto). */
  .frame {
    width: 1440px;
    height: calc(100vh - 48px);   /* 24px margin top + 24px margin bottom */
    min-height: 720px;             /* su monitor piccoli garantiamo usabilità */
    max-height: 900px;             /* su monitor grandi non si gonfia */
    margin: 24px auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    overflow: hidden;
    position: relative;
    display: flex;
  }
  .pn-scroll::-webkit-scrollbar { width: 8px; height:8px; }
  .pn-scroll::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 999px; }
  .pn-scroll::-webkit-scrollbar-track { background: transparent; }
  input, textarea, select { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="panoramica-tokens.jsx"></script>
<script type="text/babel" src="panoramica-icons.jsx"></script>
<script type="text/babel" src="byup-tokens.jsx"></script>
<script type="text/babel" src="byup-icons.jsx"></script>
<script type="text/babel" src="panoramica-sidebar.jsx"></script>
<script type="text/babel" src="panoramica-plan-card.jsx"></script>
<script type="text/babel" src="panoramica-notif-bell.jsx"></script>
<script type="text/babel" src="impostazioni-shared.jsx"></script>
<script type="text/babel" src="impostazioni-vetrina.jsx"></script>
<script type="text/babel" src="impostazioni-personale.jsx"></script>
<script type="text/babel" src="config-completa-app.jsx"></script>
</body>
</html>
