<head>
<meta charset="utf-8"/>

<meta name="apple-mobile-web-app-capable" content="yes"/>

<title>byup — Home</title>
<style>
  html, body { margin: 0; padding: 0; background: #ececec; font-family: -apple-system, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
  @media (max-width: 768px) { .byup-screen-nav { display: none !important; } }
  .hscroll::-webkit-scrollbar { display: none; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes scan {
    0%, 100% { transform: translateY(0); opacity: 0.9; }
    50% { transform: translateY(0); opacity: 0.4; }
  }
  @keyframes scanline {
    0% { top: 24px; }
    50% { top: calc(100% - 26px); }
    100% { top: 24px; }
  }
  button:active { opacity: 0.85; }
</style>
</head>

<div id="root"></div>
