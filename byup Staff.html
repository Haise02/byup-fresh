<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>byup Staff — App cameriere</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1a1f;
    color: #0F1115;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 16px;
  }
  #stage {
    display: flex; gap: 28px; align-items: flex-start;
    flex-wrap: wrap; justify-content: center; max-width: 1400px;
  }
  .meta {
    color: rgba(255,255,255,0.55); font-size: 11px;
    letter-spacing: 0.4px; text-transform: uppercase;
    text-align: center; margin-top: 12px; font-weight: 600;
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
</style>
</head>
<body>
  <div id="stage">
    <div>
      <div id="phone-frame"></div>
      <div class="meta">byup Staff · v1.0 · Marco Rinaldi</div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="staff-tokens.jsx"></script>
  <script type="text/babel" src="staff-data.jsx"></script>
  <script type="text/babel" src="staff-screen-sala.jsx"></script>
  <script type="text/babel" src="staff-screen-tavolo.jsx"></script>
  <script type="text/babel" src="staff-screen-menu.jsx"></script>
  <script type="text/babel" src="staff-screen-ordini.jsx"></script>
  <script type="text/babel" src="staff-screen-pagamento.jsx"></script>
  <script type="text/babel" src="staff-modali.jsx"></script>

  <script type="text/babel" src="staff-app.jsx"></script>

  <script type="text/babel">
    function Mount() {
      return (
        <IOSDevice>
          <div style={{ position:'relative', width:'100%', height:'100%', fontFamily:"'Plus Jakarta Sans', sans-serif", overflow:'hidden' }}>
            <StaffApp/>
          </div>
        </IOSDevice>
      );
    }
    ReactDOM.createRoot(document.getElementById('phone-frame')).render(<Mount/>);
  </script>
</body>
</html>
