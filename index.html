<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>byup — Fresh</title>
<!-- Redirect istantaneo alla pagina di login. Il flusso prosegue:
     login (admin/admin) → onboarding ristoratore → panoramica/configurazione. -->
<meta http-equiv="refresh" content="0; url=byup%20Login.html"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: #FAFBFC;
    color: #1A1D24;
    display: grid;
    place-items: center;
    text-align: center;
  }
  .loader {
    width: 24px; height: 24px;
    border: 2px solid rgba(15, 17, 21, 0.10);
    border-top-color: #FF5A5F;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { font-size: 13px; color: #6B6B6B; margin: 0; }
  a { color: #FF5A5F; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div>
  <div class="loader" aria-hidden="true"></div>
  <p>Apertura di byup…</p>
  <p style="margin-top: 8px"><a href="byup%20Login.html">Vai alla pagina di accesso</a></p>
</div>
<script>
  // Fallback JS se il meta-refresh non è supportato
  setTimeout(function() { window.location.replace('byup%20Login.html'); }, 100);
</script>
</body>
</html>
